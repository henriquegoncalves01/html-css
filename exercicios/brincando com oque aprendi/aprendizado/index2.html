<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu</title>
    <style>
        *{
            margin: 0px;
        }

        html{
        scroll-behavior: smooth;
        }

        header{
            position: fixed;
            display: flex;
            flex-flow: row nowrap;
            align-items: center;
            justify-content: center;
            gap: 2rem;

            height: 70px;
            width: 100%;
            background-color: white;
            font-size: 1.5em;

            box-shadow: 1px 2px 3px rgba(0, 0, 0, 0.301);
        }
        nav > a{
            text-decoration: none;
            color: black;
        }

        nav > a:hover{
            color: blue;
            text-decoration: underline; 
        }

        section{
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 40px;
        }
        #inicio{
            background-color: skyblue;
        }
        #meio{
            background-color: lightblue;
        }
        #fim{
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <header>
        <nav><a href="#inicio">Inicio</a></nav>
        <nav><a href="#meio">Meio</a></nav>
        <nav><a href="#fim">Fim</a></nav>
    </header>
    <section id="inicio">
        <h1>Inicio</h1>
    </section>
    <section id="meio">
        <h1>Meio</h1>
    </section>
    <section id="fim">
        <h1>Fim</h1>
    </section>
</body>
</html>
